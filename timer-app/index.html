<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>计时器 App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>计时器</h1>
        <div id="display">00:00:00</div>
        <div class="buttons">
            <button id="startBtn">开始</button>
            <button id="pauseBtn" disabled>暂停</button>
            <button id="resetBtn">重置</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
